<!-- Top Navbar -->
<nav class="top-navbar">
    <div class="navbar-left">
        <button class="sidebar-toggle d-lg-none" id="sidebarOpen">
            <i class="bi bi-list"></i>
        </button>
        <h1 class="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
    </div>
    <div class="navbar-right">
        <div class="navbar-item">
            <span class="text-muted me-2 d-none d-md-inline">
                <i class="bi bi-clock me-1"></i>
                <span id="currentDateTime"></span>
            </span>
        </div>
        <div class="dropdown">
            <button class="btn btn-link navbar-user-btn dropdown-toggle" type="button" data-bs-toggle="dropdown">
                <i class="bi bi-person-circle me-1"></i>
                <span class="d-none d-md-inline">{{ user.get_full_name|default:user.username }}</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><span class="dropdown-item-text text-muted">{{ user.get_role_display }}</span></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="{% url 'accounts:change_password' %}"><i class="bi bi-key me-2"></i>Change Password</a></li>
                <li><a class="dropdown-item text-danger" href="{% url 'accounts:logout' %}"><i class="bi bi-box-arrow-left me-2"></i>Logout</a></li>
            </ul>
        </div>
    </div>
</nav>
